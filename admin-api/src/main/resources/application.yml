server:
  port: 8181

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    driver-class-name: org.postgresql.Driver
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:super_secure_jwt_secret_key_at_least_32_chars_long_exchange_api_token}
  # 각 마켓 심볼별 실시간 오더북 스냅샷을 수신할 포트 매핑 설정
  market-ports:
    "BTC-USD": 9100
    "ADA-KRW": 9101
    "JAF-KRW": 9103
    "JAF-USD": 9105

# MyBatis 전역 Enum 타입 핸들러 설정 (자바 Enum과 DB 문자열 자동 매핑용)
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
    map-underscore-to-camel-case: true
