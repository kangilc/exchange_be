version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  engine-btc:
    build:
      context: .
      dockerfile: engine-core/Dockerfile
    container_name: matching-engine-btc
    env_file:
      - .env.dev
    environment:
      - METRICS_ENABLED=true
      - METRICS_PORT=9100
    ports:
      - "9999:9999"
      - "9998:9998"
      - "9100:9100"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4g

  kafka-adapter-btc:
    build:
      context: .
      dockerfile: adapter-kafka/Dockerfile
    container_name: kafka-adapter-btc
    depends_on:
      - engine-btc
      - kafka
    environment:
      - KAFKA_BROKER=kafka:9092
      - ENGINE_HOST=engine-btc
      - ENGINE_PORT=9998
    restart: on-failure

  ws-gateway:
    build:
      context: .
      dockerfile: adapter-ws/Dockerfile
    container_name: ws-gateway
    depends_on:
      - kafka
    ports:
      - "8080:8080"
      - "9102:9102"
    env_file:
      - .env.dev
    environment:
      - METRICS_ENABLED=true
      - METRICS_PORT=9102
    restart: on-failure

  order-generator:
    build:
      context: .
      dockerfile: order-generator/Dockerfile
    container_name: order-generator
    depends_on:
      - engine-btc
      - engine-ada
    env_file:
      - .env.dev
    environment:
      - ADA_COMMAND_PORT=9997
      - ADA_ENGINE_HOST=engine-ada
    restart: on-failure

  engine-ada:
    build:
      context: .
      dockerfile: engine-core/Dockerfile
    container_name: matching-engine-ada
    environment:
      - SYMBOL=ADA-KRW
      - COMMAND_PORT=9997
      - ENGINE_PORT=9996
      - METRICS_ENABLED=true
      - METRICS_PORT=9101
    ports:
      - "9997:9997"
      - "9996:9996"
      - "9101:9101"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2g

  kafka-adapter-ada:
    build:
      context: .
      dockerfile: adapter-kafka/Dockerfile
    container_name: kafka-adapter-ada
    depends_on:
      - engine-ada
      - kafka
    environment:
      - KAFKA_BROKER=kafka:9092
      - ENGINE_HOST=engine-ada
      - ENGINE_PORT=9996
    restart: on-failure

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - engine-btc
      - engine-ada
      - ws-gateway
    restart: always

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=exchange
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  db-persister:
    build:
      context: .
      dockerfile: adapter-kafka/DockerfilePersister
    container_name: db-persister
    depends_on:
      - kafka
      - postgres
    environment:
      - KAFKA_BROKER=kafka:9092
      - DB_URL=jdbc:postgresql://postgres:5432/exchange
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    restart: on-failure

  audit-volume:
    image: busybox:latest
    container_name: audit-volume
    volumes:
      - ./audit/reports:/audit
    command: ["sh", "-c", "tail -f /dev/null"]
