server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'
      - source_labels: ['__meta_docker_container_id']
        target_label: '__path__'
        replacement: '/var/lib/docker/containers/$1/$1-json.log'
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
      - match:
          selector: '{container="ganache"}'
          stages:
            - regex:
                expression: '(?P<is_blocknumber>eth_blockNumber)'
                source: output
            - template:
                source: output
                template: '{{ if .is_blocknumber }}{{ .output }} (💡 admin-api의 Web3j 블록체인 최신 블록 높이/트랜잭션 확정 폴링){{ else }}{{ .output }}{{ end }}'
      - output:
          source: output
