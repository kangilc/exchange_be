global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: 'matching-engine-btc'
    static_configs:
      - targets: ['engine-btc:9100']

  - job_name: 'matching-engine-ada'
    static_configs:
      - targets: ['engine-ada:9101']

  - job_name: 'ws-gateway'
    static_configs:
      - targets: ['ws-gateway:9102']
