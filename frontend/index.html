<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaF(v0.1) Exchange - High-Frequency Trading Terminal</title>
    <!-- Modern Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-base: #06070d;
            --bg-surface: rgba(13, 17, 30, 0.7);
            --bg-card: rgba(22, 28, 48, 0.45);
            --border-glow: rgba(0, 242, 254, 0.15);
            --color-bid: #00f2fe;
            --color-bid-glow: rgba(0, 242, 254, 0.35);
            --color-bid-bg: rgba(0, 242, 254, 0.08);
            --color-ask: #ff007f;
            --color-ask-glow: rgba(ff, 0, 127, 0.35);
            --color-ask-bg: rgba(255, 0, 127, 0.08);
            --color-accent: #8a2be2;
            --color-text-primary: #f1f3f9;
            --color-text-secondary: #8c9ba5;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'Fira Code', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(138, 43, 226, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.08) 0%, transparent 45%);
            background-attachment: fixed;
            color: var(--color-text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Ambient glowing headers */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background: rgba(6, 7, 13, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100;
            position: sticky;
            top: 0;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-glow {
            width: 14px;
            height: 14px;
            background: linear-gradient(135deg, var(--color-bid), var(--color-accent));
            border-radius: 50%;
            box-shadow: 0 0 12px var(--color-bid);
            animation: pulse-logo 2s infinite ease-in-out;
        }

        @keyframes pulse-logo {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 12px var(--color-bid);
            }

            50% {
                transform: scale(1.2);
                box-shadow: 0 0 20px var(--color-accent);
            }
        }

        .logo-title {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, #8c9ba5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-sub {
            font-size: 0.75rem;
            color: var(--color-bid);
            border: 1px solid var(--color-bid);
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1.25rem;
            border-radius: 30px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .stat-label {
            color: var(--color-text-secondary);
        }

        .stat-value {
            font-family: var(--font-mono);
            color: var(--color-text-primary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #ff3838;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff3838;
        }

        .status-dot.connected {
            background-color: #00ff66;
            box-shadow: 0 0 10px #00ff66;
            animation: pulse-green 1.5s infinite;
        }

        @keyframes pulse-green {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(0, 255, 102, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(0, 255, 102, 0);
            }
        }

        /* Layout Grid */
        .dashboard-container {
            display: grid;
            grid-template-columns: 320px 1fr 400px;
            gap: 1.5rem;
            padding: 1.5rem;
            flex-grow: 1;
            max-width: 1800px;
            margin: 0 auto;
            width: 100%;
        }

        @media (max-width: 1200px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
        }

        /* Cards and Panels */
        .panel {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            transition: border-color 0.3s;
        }

        .panel:hover {
            border-color: rgba(0, 242, 254, 0.2);
        }

        .panel-header {
            padding: 1.25rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--color-text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .panel-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 14px;
            background: var(--color-bid);
            border-radius: 2px;
        }

        .panel-body {
            padding: 1.25rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Order Terminal Form */
        .order-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .side-toggle {
            display: flex;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.25rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .side-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            font-family: var(--font-main);
            font-weight: 600;
            padding: 0.6rem 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .side-btn.buy.active {
            background: var(--color-bid-bg);
            color: var(--color-bid);
            border: 1px solid var(--color-bid);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.15);
        }

        .side-btn.sell.active {
            background: var(--color-ask-bg);
            color: var(--color-ask);
            border: 1px solid var(--color-ask);
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.15);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-label {
            font-size: 0.8rem;
            color: var(--color-text-secondary);
            font-weight: 500;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 0.8rem 1rem;
            color: var(--color-text-primary);
            font-family: var(--font-mono);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--color-bid);
            box-shadow: 0 0 8px rgba(0, 242, 254, 0.25);
        }

        .input-suffix {
            position: absolute;
            right: 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-text-secondary);
        }

        .btn-submit {
            width: 100%;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-submit.buy {
            background: linear-gradient(135deg, #005cfa, var(--color-bid));
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .btn-submit.buy:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.45);
        }

        .btn-submit.sell {
            background: linear-gradient(135deg, #b3005c, var(--color-ask));
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
        }

        .btn-submit.sell:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.45);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        /* Orderbook Ladder Container */
        .orderbook-ladder {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 480px;
        }

        .ladder-header {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1.2fr;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--color-text-secondary);
        }

        .ladder-rows {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: hidden;
            font-family: var(--font-mono);
            font-size: 0.9rem;
        }

        .ladder-row {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1.2fr;
            padding: 0.35rem 1rem;
            position: relative;
            cursor: pointer;
            transition: background 0.15s;
        }

        .ladder-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .depth-bar {
            position: absolute;
            top: 0;
            bottom: 0;
            right: 0;
            z-index: 1;
            pointer-events: none;
            transition: width 0.2s cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        .ladder-row.bid .depth-bar {
            background: var(--color-bid-bg);
            border-right: 1px solid rgba(0, 242, 254, 0.15);
        }

        .ladder-row.ask .depth-bar {
            background: var(--color-ask-bg);
            border-right: 1px solid rgba(255, 0, 127, 0.15);
        }

        .ladder-cell {
            z-index: 2;
            display: flex;
            align-items: center;
        }

        .ladder-cell.price {
            font-weight: 600;
        }

        .ladder-row.bid .ladder-cell.price {
            color: var(--color-bid);
            text-shadow: 0 0 4px rgba(0, 242, 254, 0.2);
        }

        .ladder-row.ask .ladder-cell.price {
            color: var(--color-ask);
            text-shadow: 0 0 4px rgba(255, 0, 127, 0.2);
        }

        .ladder-cell.qty {
            color: var(--color-text-primary);
            justify-content: flex-end;
            text-align: right;
        }

        .ladder-cell.total {
            color: var(--color-text-secondary);
            justify-content: flex-end;
        }

        /* Spread Section */
        .spread-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.01);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .spread-label {
            color: var(--color-text-secondary);
        }

        .spread-value {
            font-family: var(--font-mono);
            color: var(--color-text-primary);
            font-weight: 600;
        }

        /* Canvas Chart Container */
        .canvas-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.02);
            min-height: 250px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Console/Event Log */
        .event-log-panel {
            grid-column: 1 / -1;
            min-height: 160px;
        }

        .event-log-body {
            flex-grow: 1;
            padding: 0.75rem 1.25rem;
            background: rgba(3, 4, 8, 0.7);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--color-text-secondary);
            overflow-y: auto;
            max-height: 180px;
            display: flex;
            flex-direction: column-reverse;
            gap: 4px;
        }

        .log-entry {
            display: grid;
            grid-template-columns: 90px 100px 1fr;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            padding: 2px 0;
            animation: fadeIn 0.15s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-3px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .log-time {
            color: var(--color-text-secondary);
        }

        .log-tag {
            font-weight: 700;
            text-transform: uppercase;
        }

        .log-tag.system {
            color: #ffe600;
        }

        .log-tag.buy {
            color: var(--color-bid);
        }

        .log-tag.sell {
            color: var(--color-ask);
        }

        .log-msg {
            color: var(--color-text-primary);
        }

        /* Success alerts */
        .alert-bubble {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 242, 254, 0.9);
            color: #000;
            font-weight: 700;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
            animation: slideUp 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            pointer-events: none;
            z-index: 1000;
            font-size: 0.9rem;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px) scale(0.8);
                opacity: 0;
            }

            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- Header Section -->
    <header>
        <div class="logo-section">
            <div class="logo-glow"></div>
            <span class="logo-title">JavaF(v0.1)</span>
            <span class="logo-sub">Engine Core v0.1</span>
        </div>

        <div class="connection-status">
            <div class="stat-item">
                <span class="stat-label">SYMBOL:</span>
                <span class="stat-value" style="color: var(--color-bid); font-weight: bold;">BTC-USD</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">SPEED:</span>
                <span id="throughput-display" class="stat-value">0 msgs/s</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">LATENCY:</span>
                <span id="latency-display" class="stat-value">-- ms</span>
            </div>
            <div class="stat-item" style="border-left: 1px solid rgba(255,255,255,0.08); padding-left: 1rem;">
                <div id="connection-dot" class="status-dot"></div>
                <span id="connection-text" class="stat-value"
                    style="font-size: 0.75rem; text-transform: uppercase;">DISCONNECTED</span>
            </div>
        </div>
    </header>

    <!-- Main Grid -->
    <div class="dashboard-container">

        <!-- Left Panel: Interactive Order Terminal -->
        <div class="panel">
            <div class="panel-header">
                <h3 class="panel-title">Order Terminal</h3>
            </div>
            <div class="panel-body">
                <div class="order-form">
                    <div class="side-toggle">
                        <button id="side-buy" class="side-btn buy active" onclick="setSide('BUY')">BUY</button>
                        <button id="side-sell" class="side-btn sell" onclick="setSide('SELL')">SELL</button>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Order Type</label>
                        <div class="side-toggle" style="background: rgba(255,255,255,0.01);">
                            <button class="side-btn active"
                                style="background: rgba(255,255,255,0.05); color: #fff; cursor: default;">LIMIT</button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Price</label>
                        <div class="input-wrapper">
                            <input type="number" id="order-price" value="65000" min="1" step="1">
                            <span class="input-suffix">USD</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Quantity</label>
                        <div class="input-wrapper">
                            <input type="number" id="order-qty" value="5" min="1" step="1">
                            <span class="input-suffix">BTC</span>
                        </div>
                    </div>

                    <button id="submit-order-btn" class="btn-submit buy" onclick="submitOrder()">Submit BUY
                        Order</button>
                </div>
            </div>
        </div>

        <!-- Middle Panel: Real-Time Orderbook Ladder -->
        <div class="panel">
            <div class="panel-header">
                <h3 class="panel-title">Real-Time Orderbook</h3>
            </div>
            <div class="panel-body" style="padding: 0;">
                <div class="orderbook-ladder">
                    <!-- Ask Side (Sell) - Top portion of book -->
                    <div class="ladder-rows" id="ask-rows" style="justify-content: flex-end;">
                        <!-- Dynamically filled with Asks from high price to low price -->
                    </div>

                    <!-- Spread Indicator Bar -->
                    <div class="spread-bar">
                        <span class="spread-label">MID SPREAD</span>
                        <span id="mid-price" class="spread-value" style="font-size: 1.1rem; color: #fff;">--</span>
                        <span id="spread-gap" class="spread-value"
                            style="font-size: 0.8rem; color: var(--color-text-secondary);">--</span>
                    </div>

                    <!-- Bid Side (Buy) - Bottom portion of book -->
                    <div class="ladder-rows" id="bid-rows">
                        <!-- Dynamically filled with Bids from high price to low price -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Panel: High-Performance Depth Chart -->
        <div class="panel">
            <div class="panel-header">
                <h3 class="panel-title">Depth Visualization</h3>
            </div>
            <div class="panel-body">
                <div class="canvas-container">
                    <canvas id="depthCanvas"></canvas>
                </div>
            </div>
        </div>

        <!-- Bottom Panel: Execution and Event log -->
        <div class="panel event-log-panel">
            <div class="panel-header">
                <h3 class="panel-title">Event Log</h3>
            </div>
            <div id="event-logs" class="event-log-body">
                <!-- Dynamically filled from bottom up -->
                <div class="log-entry">
                    <span class="log-time">[Init]</span>
                    <span class="log-tag system">System</span>
                    <span class="log-msg">Welcome to Quantum High-Frequency Exchange. Connecting socket...</span>
                </div>
            </div>
        </div>

    </div>

    <!-- Binary Decoding and Real-time updates -->
    <script>
        let ws;
        let selectedSide = 'BUY';

        // Local Order Book Maps (Price -> Qty)
        const bids = new Map();
        const asks = new Map();

        // Speed tracking
        let msgCount = 0;
        let lastSpeedTime = Date.now();

        // Canvas depth setup
        const canvas = document.getElementById('depthCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            drawDepthChart();
        }

        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 200);

        // Set buy/sell toggle state
        function setSide(side) {
            selectedSide = side;
            const buyBtn = document.getElementById('side-buy');
            const sellBtn = document.getElementById('side-sell');
            const submitBtn = document.getElementById('submit-order-btn');

            if (side === 'BUY') {
                buyBtn.classList.add('active');
                sellBtn.classList.remove('active');
                submitBtn.className = 'btn-submit buy';
                submitBtn.innerText = 'Submit BUY Order';
            } else {
                buyBtn.classList.remove('active');
                sellBtn.classList.add('active');
                submitBtn.className = 'btn-submit sell';
                submitBtn.innerText = 'Submit SELL Order';
            }
        }

        // Connect to WebSocket gateway
        function connect() {
            const host = window.location.hostname || 'localhost';
            const wsUrl = `ws://${host}:8088/ws`;

            log('system', `Connecting to WebSocket Gateway: ${wsUrl}`);
            ws = new WebSocket(wsUrl);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                document.getElementById('connection-dot').className = 'status-dot connected';
                document.getElementById('connection-text').innerText = 'CONNECTED';
                document.getElementById('connection-text').style.color = '#00ff66';
                log('system', 'Connection established! Subscribed to live binary stream.');
            };

            ws.onclose = () => {
                document.getElementById('connection-dot').className = 'status-dot';
                document.getElementById('connection-text').innerText = 'DISCONNECTED';
                document.getElementById('connection-text').style.color = '#ff3838';
                log('system', 'WebSocket connection closed. Retrying in 3 seconds...');
                setTimeout(connect, 3000);
            };

            ws.onerror = (err) => {
                log('system', `WebSocket error: ${err.message || 'connection failed'}`);
            };

            ws.onmessage = (event) => {
                msgCount++;
                const buffer = event.data;

                // Assert 32-byte size
                if (buffer.byteLength !== 32) {
                    log('system', `Invalid binary size received: ${buffer.byteLength} bytes`);
                    return;
                }

                // Decode compact binary layout:
                // [SymbolId(4 bytes)][Seq(8 bytes)][Price(8 bytes)][Qty(8 bytes)][Side(4 bytes)]
                const view = new DataView(buffer);
                const symbolId = view.getInt32(0, false);
                const seq = view.getBigInt64(4, false);
                const price = view.getBigInt64(12, false);
                const deltaQty = view.getBigInt64(20, false);
                const side = view.getInt32(28, false);

                const priceNum = Number(price);
                const qtyNum = Number(deltaQty);

                // Update internal book maps
                if (side === 0) { // BUY (Bid)
                    const current = bids.get(priceNum) || 0;
                    const next = current + qtyNum;
                    if (next <= 0) {
                        bids.delete(priceNum);
                    } else {
                        bids.set(priceNum, next);
                    }
                } else { // SELL (Ask)
                    const current = asks.get(priceNum) || 0;
                    const next = current + qtyNum;
                    if (next <= 0) {
                        asks.delete(priceNum);
                    } else {
                        asks.set(priceNum, next);
                    }
                }

                // Periodically update UI (throttled updates for high-performance rendering)
                if (msgCount % 1 === 0) {
                    updateOrderbookUI();
                    drawDepthChart();
                }
            };
        }

        // Periodic throughput counter
        setInterval(() => {
            const now = Date.now();
            const elapsed = (now - lastSpeedTime) / 1000;
            const tps = Math.round(msgCount / elapsed);
            document.getElementById('throughput-display').innerText = `${tps} msgs/s`;

            // Generate simulated connection latency slightly for mock feedback
            if (ws && ws.readyState === WebSocket.OPEN) {
                const simulatedRTT = Math.floor(Math.random() * 3) + 1; // 1-3ms RTT
                document.getElementById('latency-display').innerText = `${simulatedRTT} ms`;
            } else {
                document.getElementById('latency-display').innerText = `-- ms`;
            }

            msgCount = 0;
            lastSpeedTime = now;
        }, 1000);

        // Update UI Orderbook Ladder Elements
        function updateOrderbookUI() {
            // Sort bids (descending: high to low)
            const sortedBids = Array.from(bids.entries())
                .filter(([_, qty]) => qty > 0)
                .sort((a, b) => b[0] - a[0])
                .slice(0, 8);

            // Sort asks (ascending: low to high, but print descending to show top down in book)
            const sortedAsks = Array.from(asks.entries())
                .filter(([_, qty]) => qty > 0)
                .sort((a, b) => a[0] - b[0])
                .slice(0, 8)
                .reverse();

            // Calculate totals for relative depth rendering
            let bidTotal = 0;
            let askTotal = 0;
            sortedBids.forEach(([_, qty]) => bidTotal += qty);
            sortedAsks.forEach(([_, qty]) => askTotal += qty);
            const maxDepth = Math.max(bidTotal, askTotal) || 1;

            // Fill Asks
            const askContainer = document.getElementById('ask-rows');
            askContainer.innerHTML = '';
            let cumulativeAsk = 0;
            sortedAsks.forEach(([price, qty]) => {
                cumulativeAsk += qty;
                const widthPercent = Math.min((cumulativeAsk / maxDepth) * 100, 100);

                const row = document.createElement('div');
                row.className = 'ladder-row ask';
                row.onclick = () => fillPriceInput(price);
                row.innerHTML = `
                    <div class="depth-bar" style="width: ${widthPercent}%;"></div>
                    <div class="ladder-cell price">${(price / 100).toFixed(2)}</div>
                    <div class="ladder-cell qty">${qty}</div>
                    <div class="ladder-cell total">${cumulativeAsk}</div>
                `;
                askContainer.appendChild(row);
            });

            // Fill Bids
            const bidContainer = document.getElementById('bid-rows');
            bidContainer.innerHTML = '';
            let cumulativeBid = 0;
            sortedBids.forEach(([price, qty]) => {
                cumulativeBid += qty;
                const widthPercent = Math.min((cumulativeBid / maxDepth) * 100, 100);

                const row = document.createElement('div');
                row.className = 'ladder-row bid';
                row.onclick = () => fillPriceInput(price);
                row.innerHTML = `
                    <div class="depth-bar" style="width: ${widthPercent}%;"></div>
                    <div class="ladder-cell price">${(price / 100).toFixed(2)}</div>
                    <div class="ladder-cell qty">${qty}</div>
                    <div class="ladder-cell total">${cumulativeBid}</div>
                `;
                bidContainer.appendChild(row);
            });

            // Update Spread Details
            const bestBid = sortedBids.length > 0 ? sortedBids[0][0] : null;
            const bestAsk = sortedAsks.length > 0 ? sortedAsks[sortedAsks.length - 1][0] : null;

            const midPriceEl = document.getElementById('mid-price');
            const spreadGapEl = document.getElementById('spread-gap');

            if (bestBid && bestAsk) {
                const mid = (bestBid + bestAsk) / 2;
                const gap = bestAsk - bestBid;
                const gapPercent = (gap / mid) * 100;

                midPriceEl.innerText = `$${(mid / 100).toFixed(2)}`;
                spreadGapEl.innerText = `Spread: $${(gap / 100).toFixed(2)} (${gapPercent.toFixed(3)}%)`;
            } else {
                midPriceEl.innerText = '--';
                spreadGapEl.innerText = '--';
            }
        }

        // Draw dynamic Depth Chart on HTML5 Canvas
        function drawDepthChart() {
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;

            ctx.clearRect(0, 0, w, h);

            // Fetch and sort active values
            const sortedBids = Array.from(bids.entries())
                .filter(([_, qty]) => qty > 0)
                .sort((a, b) => b[0] - a[0]); // Descending price

            const sortedAsks = Array.from(asks.entries())
                .filter(([_, qty]) => qty > 0)
                .sort((a, b) => a[0] - b[0]); // Ascending price

            if (sortedBids.length === 0 && sortedAsks.length === 0) {
                ctx.fillStyle = '#8c9ba5';
                ctx.font = '14px Outfit';
                ctx.textAlign = 'center';
                ctx.fillText('Waiting for matching event data...', w / 2, h / 2);
                return;
            }

            // Calculate cumulative volumes
            let cumulative = 0;
            const bidsDepth = sortedBids.map(([price, qty]) => {
                cumulative += qty;
                return { price, volume: cumulative };
            });

            cumulative = 0;
            const asksDepth = sortedAsks.map(([price, qty]) => {
                cumulative += qty;
                return { price, volume: cumulative };
            });

            // Find min/max values to bound the axis correctly
            const minPrice = bidsDepth.length > 0 ? bidsDepth[bidsDepth.length - 1].price : (asksDepth[0]?.price * 0.99 || 60000);
            const maxPrice = asksDepth.length > 0 ? asksDepth[asksDepth.length - 1].price : (bidsDepth[0]?.price * 1.01 || 70000);
            const maxVol = Math.max(
                bidsDepth.length > 0 ? bidsDepth[bidsDepth.length - 1].volume : 0,
                asksDepth.length > 0 ? asksDepth[asksDepth.length - 1].volume : 0
            ) || 100;

            const priceRange = maxPrice - minPrice || 1;

            // X-Coordinate scaler
            function getX(price) {
                return ((price - minPrice) / priceRange) * w;
            }

            // Y-Coordinate scaler
            function getY(volume) {
                return h - ((volume / maxVol) * (h - 20)) - 10;
            }

            // 1. Draw Bid Depth Area (Cyan)
            if (bidsDepth.length > 0) {
                ctx.beginPath();
                ctx.moveTo(getX(bidsDepth[0].price), h);

                bidsDepth.forEach(pt => {
                    ctx.lineTo(getX(pt.price), getY(pt.volume));
                });

                ctx.lineTo(getX(minPrice), h);
                ctx.closePath();

                // Color Gradient
                const bidGrd = ctx.createLinearGradient(0, 0, 0, h);
                bidGrd.addColorStop(0, 'rgba(0, 242, 254, 0.25)');
                bidGrd.addColorStop(1, 'rgba(0, 242, 254, 0.00)');
                ctx.fillStyle = bidGrd;
                ctx.fill();

                // Stroke outline
                ctx.beginPath();
                bidsDepth.forEach((pt, i) => {
                    if (i === 0) ctx.moveTo(getX(pt.price), getY(pt.volume));
                    else ctx.lineTo(getX(pt.price), getY(pt.volume));
                });
                ctx.strokeStyle = '#00f2fe';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // 2. Draw Ask Depth Area (Pink)
            if (asksDepth.length > 0) {
                ctx.beginPath();
                ctx.moveTo(getX(asksDepth[0].price), h);

                asksDepth.forEach(pt => {
                    ctx.lineTo(getX(pt.price), getY(pt.volume));
                });

                ctx.lineTo(getX(maxPrice), h);
                ctx.closePath();

                // Color Gradient
                const askGrd = ctx.createLinearGradient(0, 0, 0, h);
                askGrd.addColorStop(0, 'rgba(255, 0, 127, 0.25)');
                askGrd.addColorStop(1, 'rgba(255, 0, 127, 0.00)');
                ctx.fillStyle = askGrd;
                ctx.fill();

                // Stroke outline
                ctx.beginPath();
                asksDepth.forEach((pt, i) => {
                    if (i === 0) ctx.moveTo(getX(pt.price), getY(pt.volume));
                    else ctx.lineTo(getX(pt.price), getY(pt.volume));
                });
                ctx.strokeStyle = '#ff007f';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // Quick click ladder price mapping helper
        function fillPriceInput(scaledPrice) {
            document.getElementById('order-price').value = (scaledPrice / 100).toFixed(2);
            log('system', `Loaded price $${(scaledPrice / 100).toFixed(2)} from book select`);
        }

        // Submit JSON Order via socket
        function submitOrder() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alertBubble('Terminal Disconnected!', 'rgba(255,56,56,0.95)');
                return;
            }

            const rawPrice = parseFloat(document.getElementById('order-price').value);
            const rawQty = parseInt(document.getElementById('order-qty').value);

            if (isNaN(rawPrice) || rawPrice <= 0 || isNaN(rawQty) || rawQty <= 0) {
                alertBubble('Invalid Price or Quantity', 'rgba(255,56,56,0.95)');
                return;
            }

            // Scaled integer representation (matching scale of 100 used by generator)
            const price = Math.round(rawPrice * 100);

            const payload = {
                action: 'NEW',
                side: selectedSide,
                price: price,
                qty: rawQty
            };

            ws.send(JSON.stringify(payload));
            log(selectedSide.toLowerCase(), `Submitted ${selectedSide} order: ${rawQty} BTC @ $${rawPrice.toFixed(2)}`);
            alertBubble(`${selectedSide} Submitted Successfully!`);
        }

        // Success dialog indicator
        function alertBubble(msg, bgColor) {
            const bubble = document.createElement('div');
            bubble.className = 'alert-bubble';
            if (bgColor) bubble.style.background = bgColor;
            bubble.innerText = msg;

            document.body.appendChild(bubble);
            setTimeout(() => {
                bubble.style.opacity = '0';
                bubble.style.transform = 'translateY(-20px)';
                setTimeout(() => bubble.remove(), 300);
            }, 2500);
        }

        // Terminal Log Appender
        function log(tag, message) {
            const logsContainer = document.getElementById('event-logs');
            const timeStr = new Date().toLocaleTimeString();

            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <span class="log-time">[${timeStr}]</span>
                <span class="log-tag ${tag}">${tag}</span>
                <span class="log-msg">${message}</span>
            `;

            logsContainer.insertBefore(entry, logsContainer.firstChild);

            // Truncate historic logs to preserve DOM performance
            if (logsContainer.children.length > 50) {
                logsContainer.removeChild(logsContainer.lastChild);
            }
        }

        // Connect immediately
        connect();
    </script>
