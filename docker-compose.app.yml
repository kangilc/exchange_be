name: exchange-app

services:
  # =========================================================================
  # 4. 거래 매칭 엔진 및 어댑터/게이트웨이
  # =========================================================================

  # engine-btc: 초고속 인메모리 FIFO 매칭 엔진 (BTC-USD 마켓 전용 코어)
  engine-btc:
    build:
      context: .
      dockerfile: engine-core/Dockerfile
    container_name: matching-engine-btc
    env_file:
      - .env.dev # 개발 환경 변수 로드 (.env.dev 파일 기준)
    environment:
      - METRICS_ENABLED=true # 프로메테우스 수집용 메트릭 활성화 여부
      - METRICS_PORT=9100 # 메트릭 노출용 자체 HTTP 서버 포트 설정
      - JAVA_OPTS=-XX:+UseSerialGC -Xms128m -Xmx256m
    ports:
      - "9999:9999" # 주문(New/Cancel)을 수신받는 TCP 커맨드 입력 포트
      - "9998:9998" # 체결/호가 이벤트를 전송(Broadcast)하는 TCP 이벤트 출력 포트
      - "9100:9100" # Prometheus Scraper가 접근할 메트릭 노출 포트 (/metrics)
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

  # kafka-adapter-btc: 엔진의 실시간 TCP 이벤트를 구독하여 카프카 토픽으로 안전하게 퍼블리싱하는 어댑터
  kafka-adapter-btc:
    build:
      context: .
      dockerfile: adapter-kafka/Dockerfile
    container_name: kafka-adapter-btc
    depends_on:
      - engine-btc # 매칭 엔진 구동 후 실행
      - kafka # 카프카 브로커 구동 후 실행
    environment:
      - KAFKA_BROKER=kafka:9092 # 카프카 브로커 주소
      - ENGINE_HOST=engine-btc # 통신 대상 비트코인 엔진 호스트명
      - ENGINE_PORT=9998 # 비트코인 엔진의 TCP 이벤트 출력 포트
      - JAVA_OPTS=-Xms64m -Xmx128m -XX:+UseSerialGC
    restart: on-failure # 에러 발생 시 자동으로 어댑터 재시작
    deploy:
      resources:
        limits:
          memory: 256M

  # engine-ada: 초고속 인메모리 FIFO 매칭 엔진 (ADA-KRW 마켓 전용 코어)
  engine-ada:
    build:
      context: .
      dockerfile: engine-core/Dockerfile
    container_name: matching-engine-ada
    environment:
      - SYMBOL=ADA-KRW # 타겟 마켓 심볼 지정
      - COMMAND_PORT=9997 # ADA 엔진용 커맨드 입력 포트
      - ENGINE_PORT=9996 # ADA 엔진용 이벤트 출력 포트
      - METRICS_ENABLED=true # 메트릭 노출 활성화
      - METRICS_PORT=9101 # ADA 엔진 전용 메트릭 포트
      - JAVA_OPTS=-XX:+UseSerialGC -Xms128m -Xmx256m
    ports:
      - "9997:9997"
      - "9996:9996"
      - "9101:9101"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

  # kafka-adapter-ada: 에이다 엔진의 실시간 TCP 이벤트를 카프카 토픽으로 중계하는 어댑터
  kafka-adapter-ada:
    build:
      context: .
      dockerfile: adapter-kafka/Dockerfile
    container_name: kafka-adapter-ada
    depends_on:
      - engine-ada
      - kafka
    environment:
      - KAFKA_BROKER=kafka:9092
      - ENGINE_HOST=engine-ada
      - ENGINE_PORT=9996 # ADA 엔진의 이벤트 출력 포트 지정
      - JAVA_OPTS=-Xms64m -Xmx128m -XX:+UseSerialGC
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256M

  # engine-jaf-krw: 초고속 인메모리 FIFO 매칭 엔진 (JAF-KRW 원화 마켓 전용 코어)
  engine-jaf-krw:
    build:
      context: .
      dockerfile: engine-core/Dockerfile
    container_name: matching-engine-jaf-krw
    environment:
      - SYMBOL=JAF-KRW # 타겟 마켓 심볼 지정
      - COMMAND_PORT=9995 # JAF-KRW 엔진 커맨드 입력 포트
      - ENGINE_PORT=9996 # JAF-KRW 엔진 이벤트 출력 포트
      - METRICS_ENABLED=true # 메트릭 노출 활성화
      - METRICS_PORT=9103 # JAF-KRW 엔진 전용 메트릭 포트
      - JAVA_OPTS=-XX:+UseSerialGC -Xms128m -Xmx256m
    ports:
      - "9995:9995" # 주문 수신 커맨드 포트
      - "9104:9996" # 이벤트 출력 포트 (호스트 포트 충돌 방지를 위해 9104로 매핑)
      - "9103:9103" # Prometheus 메트릭 포트
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

  # kafka-adapter-jaf-krw: JAF-KRW 엔진의 실시간 TCP 이벤트를 카프카 토픽으로 중계하는 어댑터
  kafka-adapter-jaf-krw:
    build:
      context: .
      dockerfile: adapter-kafka/Dockerfile
    container_name: kafka-adapter-jaf-krw
    depends_on:
      - engine-jaf-krw # JAF-KRW 매칭 엔진 구동 후 실행
      - kafka # 카프카 브로커 구동 후 실행
    environment:
      - KAFKA_BROKER=kafka:9092
      - ENGINE_HOST=engine-jaf-krw # JAF-KRW 엔진 호스트명
      - ENGINE_PORT=9996 # JAF-KRW 엔진 이벤트 출력 포트
      - JAVA_OPTS=-Xms64m -Xmx128m -XX:+UseSerialGC
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256M

  # engine-jaf-usd: 초고속 인메모리 FIFO 매칭 엔진 (JAF-USD 달러 마켓 전용 코어)
  engine-jaf-usd:
    build:
      context: .
      dockerfile: engine-core/Dockerfile
    container_name: matching-engine-jaf-usd
    environment:
      - SYMBOL=JAF-USD # 타겟 마켓 심볼 지정
      - COMMAND_PORT=9994 # JAF-USD 엔진 커맨드 입력 포트
      - ENGINE_PORT=9993 # JAF-USD 엔진 이벤트 출력 포트
      - METRICS_ENABLED=true # 메트릭 노출 활성화
      - METRICS_PORT=9105 # JAF-USD 엔진 전용 메트릭 포트
      - JAVA_OPTS=-XX:+UseSerialGC -Xms128m -Xmx256m
    ports:
      - "9994:9994" # 주문 수신 커맨드 포트
      - "9106:9993" # 이벤트 출력 포트 (호스트 포트 충돌 방지를 위해 9106으로 매핑)
      - "9105:9105" # Prometheus 메트릭 포트
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

  # kafka-adapter-jaf-usd: JAF-USD 엔진의 실시간 TCP 이벤트를 카프카 토픽으로 중계하는 어댑터
  kafka-adapter-jaf-usd:
    build:
      context: .
      dockerfile: adapter-kafka/Dockerfile
    container_name: kafka-adapter-jaf-usd
    depends_on:
      - engine-jaf-usd # JAF-USD 매칭 엔진 구동 후 실행
      - kafka # 카프카 브로커 구동 후 실행
    environment:
      - KAFKA_BROKER=kafka:9092
      - ENGINE_HOST=engine-jaf-usd # JAF-USD 엔진 호스트명
      - ENGINE_PORT=9993 # JAF-USD 엔진 이벤트 출력 포트
      - JAVA_OPTS=-Xms64m -Xmx128m -XX:+UseSerialGC
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256M

  # ws-gateway: 클라이언트(프론트엔드 UI)와의 연결을 처리하는 Netty 기반 비동기 웹소켓 게이트웨이
  ws-gateway:
    build:
      context: .
      dockerfile: adapter-ws/Dockerfile
    container_name: ws-gateway
    depends_on:
      - kafka
    ports:
      - "8088:8088" # 웹소켓 연결용 실시간 서비스 포트
      - "9102:9102" # 웹소켓 서버 자체 성능 지표 수집용 포트
    env_file:
      - .env.dev
    environment:
      - METRICS_ENABLED=true
      - METRICS_PORT=9102
      - ADMIN_API_URL=http://admin-api:8181
      - JAVA_OPTS=-Xms64m -Xmx128m -XX:+UseSerialGC
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256M

  # db-persister: 매칭 엔진의 쓰기 병목을 제거하기 위해 카프카 이벤트를 비동기로 컨슘하여 DB에 원자적으로 정산(Settle) 처리하는 데몬
  db-persister:
    build:
      context: .
      dockerfile: adapter-kafka/DockerfilePersister
    container_name: db-persister
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
      - DB_URL=jdbc:postgresql://postgres:5432/exchange
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JAVA_OPTS=-Xms64m -Xmx128m -XX:+UseSerialGC
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256M

  # =========================================================================
  # 5. 거래소 백엔드 관리 API & 프론트엔드
  # =========================================================================

  # admin-api: 스프링 부트 기반의 거래소 통합 관리 시스템 (현황/통계, 회원/자산 CRUD, 지갑 관리 API 제공)
  admin-api:
    build:
      context: .
      dockerfile: admin-api/Dockerfile
    container_name: admin-api
    ports:
      - "8181:8181" # 관리 시스템 REST API 포트
    depends_on:
      postgres:
        condition: service_healthy
      ganache:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    env_file:
      - .env.dev
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/exchange
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xms128m -Xmx256m -XX:+UseSerialGC
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 384M

  # audit-volume: 규제 및 감사를 위한 실시간 보고서가 저장되는 파일 시스템 볼륨 격리 컨테이너
  audit-volume:
    image: busybox:latest
    container_name: audit-volume
    volumes:
      - ./audit/reports:/audit # 호스트의 audit/reports 경로를 마운트
    command: [ "sh", "-c", "tail -f /dev/null" ] # 컨테이너가 죽지 않고 무한 대기하도록 설정

  # frontend-user: React 18 + TS + Vite 기반의 회원 거래소 전용 컨테이너 (포트 5173)
  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
    container_name: frontend-user
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-user:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256M

  # frontend-admin: React 18 + TS + Vite 기반의 어드민 콘솔 전용 컨테이너 (포트 5174)
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: frontend-admin
    ports:
      - "5174:5174"
    volumes:
      - ./frontend-admin:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      admin-api:
        condition: service_started # admin-api 컨테이너가 시작되면 frontend-admin을 실행합니다.
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256M

  # =========================================================================
  # 7. 테스트 도구 (Order Generator)
  # =========================================================================
  order-generator:
    build:
      context: .
      dockerfile: order-generator/Dockerfile
    container_name: order-generator
    env_file:
      - .env.dev
    depends_on:
      - engine-btc # BTC-USD 엔진 구동 후 주문 주입 시작
      - engine-ada # ADA-KRW 엔진 구동 후 주문 주입 시작
      - engine-jaf-krw # JAF-KRW 엔진 구동 후 주문 주입 시작
      - engine-jaf-usd # JAF-USD 엔진 구동 후 주문 주입 시작
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  esdata:
    driver: local

networks:
  default:
    name: exchange_network
    external: true
